
{% extends 'base.html' %}
{% load static %}

{% block title %}
Home
{% endblock %}

{% block content %}

<div id="carouselExampleDark" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2"></button>
  </div>

  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="{% static 'images/b3.jpg' %}" class="d-block w-100"
           style="height:400px; object-fit:cover;" alt="slide1">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/b2.jpg' %}" class="d-block w-100"
           style="height:400px; object-fit:cover;" alt="slide2">
    </div>

    <div class="carousel-item">
      <img src="{% static 'images/b1.jpg' %}" class="d-block w-100"
           style="height:400px; object-fit:cover;" alt="slide3">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

{% endblock %}
